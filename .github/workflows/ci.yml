name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  recipes:
    name: cookbook recipe gates (lint + evals)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: lint (bash -n + secret/date scans)
        run: make lint
      - name: evals (every recipe's evals in mktemp fixtures)
        run: make evals
